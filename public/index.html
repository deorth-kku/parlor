<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Parlor</h1>
  </div>
  <span class="model-label" id="modelLabel">OpenAI-compatible backend</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<!-- Desktop layout (PC only) -->
<div class="pc-layout">
  <aside class="sidebar">
    <div class="side-section">
      <h3>Settings</h3>
      <div class="side-selector">
        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="side-selector">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" disabled></select>
      </div>
    </div>
    <div class="side-section">
      <h3>Input Source</h3>
      <div class="side-selector">
        <label for="inputSourceSelect">Source</label>
        <select id="inputSourceSelect"></select>
      </div>
    </div>
  </aside>

  <div class="center-col">
    <div class="portal-stack">
      <div id="viewportWrap" class="viewport-wrap loading">
        <div class="viewport-glow"></div>
        <video id="video" autoplay muted playsinline></video>
        <button id="mirrorToggle" class="mirror-toggle" type="button" hidden>
          <span class="label">Mirror</span>
          <span class="state">On</span>
        </button>
      </div>
      <div class="waveform-wrap">
        <canvas id="waveform"></canvas>
      </div>
      <div id="messages" class="transcript"></div>
    </div>
  </div>

  <aside class="sidebar">
  </aside>
</div>

<!-- Mobile layout (default) -->
<div class="mobile-layout">
  <div class="portal-stack">
    <!-- Webcam viewport with glow layers -->
    <div id="viewportWrap" class="viewport-wrap loading">
      <div class="viewport-glow"></div>
      <video id="video" autoplay muted playsinline></video>
      <button id="mirrorToggle" class="mirror-toggle" type="button" hidden>
        <span class="label">Mirror</span>
        <span class="state">On</span>
      </button>
    </div>
    
    <!-- Audio waveform visualizer -->
    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
    </div>
    <div id="messages" class="transcript"></div>
    <div class="controls">
      <div class="side-selector">
        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="side-selector">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" disabled></select>
      </div>
      <div class="side-selector">
        <label for="inputSourceSelect">Video</label>
        <select id="inputSourceSelect"></select>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
