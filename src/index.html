<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main layout (PC only, hidden on mobile) ── */
  .pc-layout {
    display: none;
    flex: 1;
    width: 100%;
    max-width: 1400px;
    padding: 0 24px 24px;
    gap: 24px;
    z-index: 2;
    min-height: 0;
  }

  /* ── Sidebar panels ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.06) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

  .side-section {
    background: var(--c-surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
  }

  .side-section h3 {
    font-size: 10px;
    font-weight: 600;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .side-selector {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .side-selector:last-child { margin-bottom: 0; }

  .side-selector label {
    font-size: 10px;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .side-selector select {
    appearance: none;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    /* Fix for dark theme dropdown */
    color-scheme: dark;
  }

  .side-selector select:hover { border-color: rgba(255,255,255,0.15); }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    width: 100%;
    text-align: center;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid transparent;
    appearance: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
  }

  .state-indicator:hover {
    color: var(--c-text);
    background: rgba(255,255,255,0.04);
  }

  .state-indicator.paused {
    color: #fca5a5;
    background: rgba(248,113,113,0.08);
    border-color: rgba(248,113,113,0.18);
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }
  .state-indicator .dot.muted {
    animation: none;
    background: #f87171;
    box-shadow: 0 0 8px rgba(248,113,113,0.22);
  }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Center column ── */
  .center-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-height: 0;
  }

  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Webcam viewport ── */
  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 22px;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #0a0a10;
    position: relative;
    z-index: 2;
  }

  video.mirror { transform: scaleX(-1); }

  .mirror-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 4;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    background: rgba(9,12,20,0.3);
    backdrop-filter: blur(14px);
    color: rgba(244,247,255,0.92);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
  }

  .mirror-toggle:hover {
    background: rgba(18,23,38,0.88);
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-1px);
  }

  .mirror-toggle:active {
    transform: translateY(0);
  }

  .mirror-toggle[hidden] {
    display: none;
  }

  .mirror-toggle .state {
    color: rgba(159,231,191,0.9);
  }

  .mirror-toggle.off .state {
    color: rgba(255,212,148,0.9);
  }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 24px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  body.layout-no-video .viewport-wrap {
    display: none;
  }

  body.layout-no-video .portal-stack {
    max-width: 860px;
  }

  body.layout-no-video .waveform-wrap {
    max-width: 720px;
    margin-top: 0;
  }

  body.layout-no-video .transcript {
    max-width: 860px;
    margin-top: 12px;
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Mobile layout (default) ── */
  .mobile-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    width: 100%;
    max-width: 720px;
    padding: 16px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  .mobile-layout .portal-stack {
    width: 100%;
    max-width: 640px;
  }

  .mobile-layout .selectors {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 10px;
    padding: 0 4px 10px;
    z-index: 2;
  }

  .mobile-layout .selector {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .mobile-layout .selector label {
    font-size: 10px;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .mobile-layout .selector select {
    appearance: none;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
  }

  .mobile-layout .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
    z-index: 2;
  }

  .mobile-layout .controls .side-selector {
    flex: 1 1 0;
    min-width: 0;
    margin-bottom: 0;
  }

  .mobile-layout .controls-meta {
    flex: 0 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    padding: 0 0 10px;
    flex-wrap: wrap;
  }

  .mobile-layout .controls .state-indicator,
  .mobile-layout .controls .on-device-pill {
    flex: 0 0 auto;
    align-self: center;
  }

  .mobile-layout .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    width: auto;
    text-align: center;
  }

  .mobile-layout .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .mobile-layout .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .mobile-layout .state-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
    padding: 6px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 999px;
    border: 1px solid transparent;
    cursor: pointer;
    appearance: none;
    width: auto;
    max-width: 100%;
    min-width: 0;
    flex: 0 1 auto;
    white-space: nowrap;
  }

  .mobile-layout .on-device-pill {
    white-space: nowrap;
  }

  .mobile-layout .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .mobile-layout .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.muted { animation: none; }

  .mobile-layout .state-indicator.paused {
    color: #fca5a5;
    background: rgba(248,113,113,0.08);
    border-color: rgba(248,113,113,0.18);
  }

  /* ── Responsive ── */
  @media (min-width: 1024px) {
    .pc-layout { display: flex; }
    .mobile-layout { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Parlor</h1>
  </div>
  <span class="model-label" id="modelLabel">OpenAI-compatible backend</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<!-- Desktop layout (PC only) -->
<div class="pc-layout">
  <!-- Left sidebar -->
  <aside class="sidebar">
    <div class="side-section">
      <h3>Settings</h3>
      <div class="side-selector">
        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="side-selector">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" disabled></select>
      </div>
    </div>

    <div class="side-section">
      <h3>Input Source</h3>
      <div class="side-selector">
        <label for="inputSourceSelect">Source</label>
        <select id="inputSourceSelect"></select>
      </div>
    </div>

    <div class="side-section">
      <h3>Status</h3>
      <button id="stateIndicator" class="state-indicator" type="button" aria-pressed="true">
        <div id="stateDot" class="dot loading"></div>
        <span id="stateText">Loading...</span>
      </button>
    </div>

    <div class="side-section">
      <span class="on-device-pill">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
        Multimodal
      </span>
    </div>
  </aside>

  <!-- Center column: video + chat -->
  <div class="center-col">
    <div class="portal-stack">
      <!-- Webcam viewport with glow layers -->
      <div id="viewportWrap" class="viewport-wrap loading">
        <div class="viewport-glow"></div>
        <video id="video" autoplay muted playsinline></video>
        <button id="mirrorToggle" class="mirror-toggle" type="button" hidden>
          <span class="label">Mirror</span>
          <span class="state">On</span>
        </button>
      </div>

      <!-- Audio waveform visualizer -->
      <div class="waveform-wrap">
        <canvas id="waveform"></canvas>
      </div>

      <!-- Transcript -->
      <div id="messages" class="transcript"></div>
    </div>
  </div>

  <!-- Right sidebar (mirrors left for balance, or leave empty) -->
  <aside class="sidebar">
    <!-- Can add more panels here in the future: history, preferences, etc. -->
  </aside>
</div>

        </button>
        <span class="on-device-pill">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
          Multimodal

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
function $$(id) {
  const showPc = window.matchMedia('(min-width: 1024px)').matches;
  const layout = showPc ? '.pc-layout' : '.mobile-layout';
  const el = document.querySelector(`${layout} #${id}`);
  if (el) return el;
  return document.getElementById(id);
}
let video, inputSourceSelect, languageSelect, voiceSelect, messagesDiv, statusEl;
let stateDot, stateText, viewportWrap, viewportGlow, waveformCanvas, waveformCtx, mirrorToggleBtn, stateIndicatorBtn;
let mirrorToggleBoundEl = null;
let stateIndicatorBoundEl = null;

function refreshElements() {
  video = $$('video');
  inputSourceSelect = $$('inputSourceSelect');
  languageSelect = $$('languageSelect');
  voiceSelect = $$('voiceSelect');
  messagesDiv = $$('messages');
  statusEl = $$('status');
  stateDot = $$('stateDot');
  stateText = $$('stateText');
  viewportWrap = $$('viewportWrap');
  viewportGlow = viewportWrap ? viewportWrap.querySelector('.viewport-glow') : null;
  waveformCanvas = $$('waveform');
  waveformCtx = waveformCanvas.getContext('2d');
  mirrorToggleBtn = $$('mirrorToggle');
  stateIndicatorBtn = $$('stateIndicator');
  syncMirrorToggleBinding();
  syncStateIndicatorBinding();
  if (video) {
    video.srcObject = mediaStream || null;
    video.classList.toggle('mirror', currentMirrorState);
  }
  applyVideoLayout();
  updateMirrorToggleUI();
  updateStateUI();
}

let ws, mediaStream, myvad, audioStream;
let cameraEnabled = true;
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let activeAssistantMsg = null;
let ttsOptions = null;
let selectedLanguage = 'ja';
let selectedVoice = 'jf_alpha';
let activeTurnId = null;
let interruptedTurnId = null;
let listeningEnabled = true;
let vadRunning = false;
let wakeLockSentinel = null;
let wakeLockRetryTimer = 0;

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;
let streamSources = [];
let streamTtsTime = null;
let scrollRaf = 0;

// ── Waveform Visualizer ──
let analyser;
let micSource = null;

function getMicSource() {
  if (!micSource && audioStream && audioStream.getAudioTracks().length) {
    micSource = audioCtx.createMediaStreamSource(audioStream);
  }
  return micSource;
}

function scrollMessagesToBottom(immediate = false) {
  if (!messagesDiv) return;
  if (immediate) {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return;
  }
  if (scrollRaf) return;
  scrollRaf = requestAnimationFrame(() => {
    scrollRaf = 0;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
const BAR_COUNT = 40;
const BAR_GAP = 3;
let waveformRAF;
let waveformResizeRAF = 0;
let ambientPhase = 0;

function initWaveformCanvas() {
  if (!waveformCanvas || !waveformCtx) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  waveformCtx.setTransform(1, 0, 0, 1, 0, 0);
  waveformCanvas.width = Math.round(rect.width * dpr);
  waveformCanvas.height = Math.round(rect.height * dpr);
  waveformCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function scheduleWaveformCanvasResize() {
  if (waveformResizeRAF) cancelAnimationFrame(waveformResizeRAF);
  waveformResizeRAF = requestAnimationFrame(() => {
    waveformResizeRAF = 0;
    initWaveformCanvas();
  });
}

function getStateColor() {
  const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function saveTtsSelection(languageCode, voice) {
  try {
    localStorage.setItem('tts_language', languageCode);
    localStorage.setItem('tts_voice', voice);
  } catch {}
}

function renderLanguageOptions() {
  languageSelect.innerHTML = '';
  for (const language of ttsOptions.languages) {
    const option = document.createElement('option');
    option.value = language.code;
    option.textContent = `${language.label} (${language.code})`;
    languageSelect.appendChild(option);
  }
}

function renderVoiceOptions(languageCode, preferredVoice = null) {
  const language = ttsOptions.languages.find(item => item.code === languageCode) || ttsOptions.languages[0];
  voiceSelect.innerHTML = '';
  for (const voice of language.voices) {
    const option = document.createElement('option');
    option.value = voice;
    option.textContent = voice;
    voiceSelect.appendChild(option);
  }
  voiceSelect.disabled = false;
  voiceSelect.value = language.voices.includes(preferredVoice) ? preferredVoice : language.default_voice;
  selectedVoice = voiceSelect.value;
}

function loadTtsSelection() {
  try {
    const lang = localStorage.getItem('tts_language');
    const voice = localStorage.getItem('tts_voice');
    if (lang && voice) return { languageCode: lang, voice };
  } catch {}
  return null;
}

function setTtsSelection(languageCode, voice) {
  selectedLanguage = languageCode;
  languageSelect.value = languageCode;
  renderVoiceOptions(languageCode, voice);
  saveTtsSelection(languageCode, voice);
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    if (!dataArray || amplitude < 0.02) {
      ambientPhase += 0.0001;
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  waveformRAF = requestAnimationFrame(drawWaveform);
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (!viewportWrap || !viewportGlow) return;
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  viewportGlow.style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

// ── State Machine ──
function setState(newState) {
  state = newState;
  updateStateUI();
  syncWakeLock();
}

function getDisplayedState() {
  if (!listeningEnabled && state === 'listening') return 'muted';
  return state;
}

function updateStateUI() {
  if (!stateDot || !stateText || !viewportWrap) return;
  const displayedState = getDisplayedState();

  stateDot.className = `dot ${displayedState}`;
  const labels = {
    loading: 'Loading...',
    listening: 'Listening',
    muted: 'Listening Off',
    processing: 'Thinking...',
    speaking: 'Speaking'
  };
  stateText.textContent = labels[displayedState] || displayedState;

  viewportWrap.className = `viewport-wrap ${state}${displayedState === 'muted' ? ' paused' : ''}`;
  if (stateIndicatorBtn) {
    stateIndicatorBtn.classList.toggle('paused', !listeningEnabled);
    stateIndicatorBtn.setAttribute('aria-pressed', String(listeningEnabled));
    stateIndicatorBtn.title = listeningEnabled
      ? 'Click to temporarily turn off voice listening'
      : 'Click to resume voice listening';
  }

  if (state !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    if (viewportGlow) viewportGlow.style.boxShadow = '';
  }

  const stateVars = {
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    muted: ['#f87171', 'rgba(248,113,113,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[displayedState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  if (state === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: state === 'speaking' ? 0.92 : 0.5 });
  }

  if (displayedState === 'listening' && analyser) {
    try { getMicSource().connect(analyser); } catch {}
  } else {
    try { getMicSource().disconnect(analyser); } catch {}
  }
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    if (state !== 'loading') setState('listening');
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      if (msg.transcription) {
        updateLatestUserMessage(msg.transcription);
      }
      activeAssistantMsg = addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
    } else if (msg.type === 'text_start') {
      activeTurnId = msg.turn_id || null;
      ignoreIncomingAudio = false;
      activeAssistantMsg = addMessage('assistant', '', '');
    } else if (msg.type === 'transcription_delta') {
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      updateLatestUserMessage(msg.text);
    } else if (msg.type === 'text_delta') {
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      if (activeAssistantMsg) {
        const meta = activeAssistantMsg.querySelector('.meta');
        const current = activeAssistantMsg.childNodes[0];
        if (current && current.nodeType === Node.TEXT_NODE) {
          current.textContent += msg.delta;
        } else {
          activeAssistantMsg.insertBefore(document.createTextNode(msg.delta), meta || null);
        }
        scrollMessagesToBottom();
      } else {
        activeAssistantMsg = addMessage('assistant', msg.delta, '');
      }
    } else if (msg.type === 'text_end') {
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      if (msg.transcription) {
        updateLatestUserMessage(msg.transcription);
      }
      if (activeAssistantMsg) {
        const meta = activeAssistantMsg.querySelector('.meta');
        const textNode = activeAssistantMsg.childNodes[0];
        if (textNode && textNode.nodeType === Node.TEXT_NODE) {
          textNode.textContent = msg.text;
        } else {
          activeAssistantMsg.insertBefore(document.createTextNode(msg.text), meta || null);
        }
        if (meta) meta.textContent = `LLM ${msg.llm_time}s`;
      } else {
        activeAssistantMsg = addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
      }
      activeAssistantMsg = null;
      scrollMessagesToBottom(true);
    } else if (msg.type === 'audio_start') {
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      if (interruptedTurnId && msg.turn_id === interruptedTurnId) return;
      if (ignoreIncomingAudio) return;
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      if (interruptedTurnId && msg.turn_id === interruptedTurnId) return;
      if (ignoreIncomingAudio) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      if (interruptedTurnId && msg.turn_id === interruptedTurnId) {
        interruptedTurnId = null;
        return;
      }
      if (msg.turn_id && activeTurnId && msg.turn_id !== activeTurnId) return;
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState('listening');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · TTS ${msg.tts_time}s`;
      interruptedTurnId = null;
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = text; }

// ── Video Source Switching ──
const VIDEO_SOURCE_STORAGE_KEY = 'parlor-video-source';
let videoSource = 'off';
let preferredVideoSource = loadVideoSourceSelection();
let currentCameraId = null;
let screenShareTrack = null;
let suppressScreenShareEnded = false;
let videoDeviceLabels = new Map();
const MIRROR_OVERRIDE_STORAGE_KEY = 'parlor-mirror-overrides';
let mirrorOverrides = loadMirrorOverrides();
let currentMirrorState = false;

refreshElements();

function loadMirrorOverrides() {
  try {
    const raw = localStorage.getItem(MIRROR_OVERRIDE_STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch {
    return {};
  }
}

function loadVideoSourceSelection() {
  try {
    return localStorage.getItem(VIDEO_SOURCE_STORAGE_KEY) || 'off';
  } catch {
    return 'off';
  }
}

function saveVideoSourceSelection(source) {
  try {
    localStorage.setItem(VIDEO_SOURCE_STORAGE_KEY, source);
  } catch {}
}

function saveMirrorOverrides() {
  try {
    localStorage.setItem(MIRROR_OVERRIDE_STORAGE_KEY, JSON.stringify(mirrorOverrides));
  } catch {}
}

function getMirrorOverride(deviceId) {
  if (!deviceId) return null;
  return Object.prototype.hasOwnProperty.call(mirrorOverrides, deviceId) ? !!mirrorOverrides[deviceId] : null;
}

function isLikelyFrontCameraLabel(label) {
  const normalized = (label || '').trim().toLowerCase();
  if (!normalized) return false;
  if (/(back|rear|environment|world|后置|後置)/i.test(normalized)) return false;
  return /(front|user|facetime|true(depth)?|integrated|built-in|内置|內置|前置)/i.test(normalized);
}

function shouldMirrorCamera(stream, deviceId) {
  const track = stream?.getVideoTracks?.()[0];
  const facingMode = track?.getSettings?.().facingMode;
  if (facingMode === 'user') return true;
  if (facingMode === 'environment') return false;
  return isLikelyFrontCameraLabel(videoDeviceLabels.get(deviceId));
}

function updateMirrorToggleUI() {
  if (!mirrorToggleBtn) return;
  const isCameraSource = !!(videoSource && videoSource !== 'off' && videoSource !== 'screen');
  mirrorToggleBtn.hidden = !isCameraSource;
  if (!isCameraSource) return;
  mirrorToggleBtn.classList.toggle('off', !currentMirrorState);
  const stateEl = mirrorToggleBtn.querySelector('.state');
  if (stateEl) stateEl.textContent = currentMirrorState ? 'On' : 'Off';
  const override = getMirrorOverride(currentCameraId);
  mirrorToggleBtn.title = override === null
    ? 'Auto detected. Click to override mirror.'
    : 'Manual override enabled. Click to toggle mirror.';
}

function syncMirrorToggleBinding() {
  if (mirrorToggleBoundEl && mirrorToggleBoundEl !== mirrorToggleBtn) {
    mirrorToggleBoundEl.removeEventListener('click', toggleMirrorOverride);
  }
  if (mirrorToggleBtn && mirrorToggleBoundEl !== mirrorToggleBtn) {
    mirrorToggleBtn.addEventListener('click', toggleMirrorOverride);
  }
  mirrorToggleBoundEl = mirrorToggleBtn;
}

function syncStateIndicatorBinding() {
  if (stateIndicatorBoundEl && stateIndicatorBoundEl !== stateIndicatorBtn) {
    stateIndicatorBoundEl.removeEventListener('click', toggleListening);
  }
  if (stateIndicatorBtn && stateIndicatorBoundEl !== stateIndicatorBtn) {
    stateIndicatorBtn.addEventListener('click', toggleListening);
  }
  stateIndicatorBoundEl = stateIndicatorBtn;
}

function setVideoMirror(shouldMirror) {
  currentMirrorState = !!shouldMirror;
  video.classList.toggle('mirror', currentMirrorState);
  updateMirrorToggleUI();
}

function resolveMirrorPreference(stream, deviceId) {
  const override = getMirrorOverride(deviceId);
  if (override !== null) return override;
  return shouldMirrorCamera(stream, deviceId);
}

function toggleMirrorOverride() {
  if (!currentCameraId) return;
  mirrorOverrides[currentCameraId] = !currentMirrorState;
  saveMirrorOverrides();
  setVideoMirror(mirrorOverrides[currentCameraId]);
}

function handleScreenShareEnded() {
  if (suppressScreenShareEnded) return;
  suppressScreenShareEnded = true;
  stopStream();
  videoSource = 'off';
  preferredVideoSource = 'off';
  saveVideoSourceSelection('off');
  inputSourceSelect.value = 'off';
  setVideoMirror(false);
  applyVideoLayout();
}

async function enumerateVideoDevices() {
  try {
    // Request camera permission first so labels are populated
    const probe = await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    probe.getTracks().forEach(t => t.stop());
    const videoInputs = devices.filter(d => d.kind === 'videoinput');
    videoDeviceLabels = new Map(videoInputs.map(d => [d.deviceId, d.label || '']));
    const select = inputSourceSelect;
    select.innerHTML = '';
    const offOpt = document.createElement('option');
    offOpt.value = 'off';
    offOpt.textContent = 'Off';
    select.appendChild(offOpt);
    for (const device of videoInputs) {
      const opt = document.createElement('option');
      opt.value = device.deviceId;
      opt.textContent = device.label || 'Camera ' + (videoInputs.indexOf(device) + 1);
      select.appendChild(opt);
    }
    const screenOpt = document.createElement('option');
    screenOpt.value = 'screen';
    screenOpt.textContent = 'Screen Share';
    select.appendChild(screenOpt);
    if (select.querySelector('option[value="' + preferredVideoSource + '"]')) {
      select.value = preferredVideoSource;
    } else {
      preferredVideoSource = 'off';
      select.value = 'off';
      saveVideoSourceSelection('off');
    }
  } catch (e) { console.warn('Enumerate devices failed:', e.message); }
}

async function stopStream() {
  suppressScreenShareEnded = true;
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  screenShareTrack = null;
  video.srcObject = null;
  suppressScreenShareEnded = false;
  applyVideoLayout();
}

function applyVideoLayout() {
  const hasVideo = !!(videoSource && videoSource !== 'off' && mediaStream);
  document.body.classList.toggle('layout-no-video', !hasVideo);
  scheduleWaveformCanvasResize();
  syncWakeLock();
}

function shouldHoldWakeLock() {
  return document.visibilityState === 'visible' && videoSource === 'off';
}

function releaseWakeLock() {
  if (wakeLockRetryTimer) {
    clearTimeout(wakeLockRetryTimer);
    wakeLockRetryTimer = 0;
  }
  if (!wakeLockSentinel) return;
  const sentinel = wakeLockSentinel;
  wakeLockSentinel = null;
  try { sentinel.release(); } catch {}
}

async function requestWakeLock() {
  if (!shouldHoldWakeLock()) return false;
  if (!('wakeLock' in navigator) || wakeLockSentinel) return !!wakeLockSentinel;
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    wakeLockSentinel.addEventListener('release', () => {
      wakeLockSentinel = null;
      if (shouldHoldWakeLock()) {
        scheduleWakeLockRetry();
      }
    });
    return true;
  } catch {
    wakeLockSentinel = null;
    return false;
  }
}

function scheduleWakeLockRetry() {
  if (wakeLockRetryTimer) return;
  wakeLockRetryTimer = window.setTimeout(() => {
    wakeLockRetryTimer = 0;
    requestWakeLock();
  }, 1000);
}

function syncWakeLock() {
  if (!shouldHoldWakeLock()) {
    releaseWakeLock();
    return;
  }
  requestWakeLock();
}

async function switchVideoSource(source, options = {}) {
  const { persist = true, force = false } = options;
  if (!force && source === videoSource && (source === 'off' || !!mediaStream)) return;
  if (persist) {
    preferredVideoSource = source;
    saveVideoSourceSelection(source);
  }
  await stopStream();
  videoSource = 'off';
  currentCameraId = null;
  setVideoMirror(false);
  if (source === 'off') {
    mediaStream = null;
  } else if (source === 'screen') {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' } });
      mediaStream = stream; screenShareTrack = stream.getVideoTracks()[0] || null;
      if (screenShareTrack) screenShareTrack.onended = handleScreenShareEnded;
      video.srcObject = stream; videoSource = 'screen';
      currentCameraId = null;
      setVideoMirror(false);
    } catch (e) { console.warn('Screen share failed:', e.message); }
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: source } } });
      mediaStream = stream; video.srcObject = stream; videoSource = source; currentCameraId = source;
      setVideoMirror(resolveMirrorPreference(stream, source));
    } catch (e) { console.warn('Camera start failed:', e.message); }
  }
  if (!persist) {
    preferredVideoSource = videoSource;
  }
  if (inputSourceSelect && inputSourceSelect.value !== videoSource) {
    inputSourceSelect.value = videoSource;
  }
  applyVideoLayout();
}

function captureFrame() {
  if (videoSource === 'off' || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800;

function handleSpeechStart() {
  if (!listeningEnabled) return;
  if (state === 'speaking') {
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    interruptedTurnId = activeTurnId;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (!listeningEnabled) return;
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const imageBase64 = captureFrame();

  setState('processing');
  setStatus('processing', 'Processing');
  addMessage('user', '<span class="loading-dots"><span></span><span></span><span></span></span>', imageBase64 ? 'with camera' : '', true);

  const payload = { audio: wavBase64, tts_language: selectedLanguage, tts_voice: selectedVoice };
  if (imageBase64) payload.image = imageBase64;
  ws.send(JSON.stringify(payload));
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Streaming Playback ──
function stopPlayback() {
  for (const src of streamSources) {
    try { src.stop(); } catch {}
  }
  streamSources = [];
  currentSource = null;
  streamNextTime = 0;
}

function setListeningEnabled(enabled) {
  listeningEnabled = enabled;
  if (myvad) {
    try {
      if (enabled && !vadRunning) {
        if (typeof myvad.start === 'function') {
          myvad.start();
          vadRunning = true;
        }
      } else if (!enabled && vadRunning) {
        if (typeof myvad.pause === 'function') {
          myvad.pause();
          vadRunning = false;
        }
      }
    } catch (e) {
      console.warn('Failed to toggle VAD:', e.message);
    }
  }
  updateStateUI();
}

function toggleListening() {
  setListeningEnabled(!listeningEnabled);
}

async function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
      getMicSource().connect(analyser);
    } catch (e) { console.warn('Mic capture failed:', e.message); }
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05;
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

// ── UI ──
function addMessage(role, text, meta, isHtml = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isHtml) {
    div.innerHTML = text;
  } else {
    div.appendChild(document.createTextNode(text));
  }
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    metaDiv.textContent = meta;
    div.appendChild(metaDiv);
  }
  messagesDiv.appendChild(div);
  scrollMessagesToBottom(true);
  return div;
}

function updateLatestUserMessage(text) {
  const userMsgs = messagesDiv.querySelectorAll('.msg.user');
  const lastUserMsg = userMsgs[userMsgs.length - 1];
  if (!lastUserMsg) return;

  const meta = lastUserMsg.querySelector('.meta');
  for (const node of [...lastUserMsg.childNodes]) {
    if (node !== meta) {
      lastUserMsg.removeChild(node);
    }
  }
  lastUserMsg.insertBefore(document.createTextNode(text), meta || null);
  scrollMessagesToBottom();
}

inputSourceSelect.addEventListener('change', () => {
  switchVideoSource(inputSourceSelect.value);
});

// ── Init ──
async function init() {
  initWaveformCanvas();
  window.addEventListener('resize', () => {
    refreshElements();
    scheduleWaveformCanvasResize();
  });
  document.addEventListener('visibilitychange', syncWakeLock);
  window.addEventListener('focus', syncWakeLock);
  window.addEventListener('pageshow', syncWakeLock);
  window.addEventListener('pagehide', releaseWakeLock);
  document.addEventListener('pointerdown', syncWakeLock, { passive: true });
  document.addEventListener('touchstart', syncWakeLock, { passive: true });

  ttsOptions = await fetch('/api/tts/options').then(response => response.json());
  const modelInfo = await fetch('/api/model').then(r => r.json()).catch(() => ({ model: null }));
  const modelLabel = document.getElementById('modelLabel');
  if (modelLabel) modelLabel.textContent = modelInfo.model || 'OpenAI-compatible backend';
  renderLanguageOptions();
  const saved = loadTtsSelection();
  if (saved) {
    setTtsSelection(saved.languageCode, saved.voice);
  } else {
    setTtsSelection(ttsOptions.default_language, ttsOptions.default_voice);
  }
  languageSelect.addEventListener('change', () => {
    selectedLanguage = languageSelect.value;
    renderVoiceOptions(selectedLanguage);
    saveTtsSelection(selectedLanguage, selectedVoice);
  });
  voiceSelect.addEventListener('change', () => {
    selectedVoice = voiceSelect.value;
    saveTtsSelection(selectedLanguage, selectedVoice);
  });

  await enumerateVideoDevices();
  if (preferredVideoSource !== 'off') {
    await switchVideoSource(preferredVideoSource, { persist: false, force: true });
  } else {
    applyVideoLayout();
  }
  connect();

  myvad = await vad.MicVAD.new({
    getStream: async () => {
      if (audioStream) { return audioStream; }
      try { return await navigator.mediaDevices.getUserMedia({ audio: true }); } catch { return new MediaStream(); }
    },
    positiveSpeechThreshold: 0.5,
    negativeSpeechThreshold: 0.25,
    redemptionMs: 600,
    minSpeechMs: 300,
    preSpeechPadMs: 300,
    onSpeechStart: handleSpeechStart,
    onSpeechEnd: handleSpeechEnd,
    onVADMisfire: () => { console.log('VAD misfire (too short)'); },
    onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
    baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
  });

  myvad.start();
  vadRunning = true;

  const initAudio = () => {
    ensureAudioCtx().then(() => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      syncWakeLock();
      document.removeEventListener('click', initAudio);
      document.removeEventListener('keydown', initAudio);
    });
  };
  document.addEventListener('click', initAudio);
  document.addEventListener('keydown', initAudio);
  ensureAudioCtx();

  setState('listening');
  setListeningEnabled(true);
  drawWaveform();

  console.log('VAD initialized and listening');
}

init();
</script>
