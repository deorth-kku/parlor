<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main layout (PC only, hidden on mobile) ── */
  .pc-layout {
    display: none;
    flex: 1;
    width: 100%;
    max-width: 1400px;
    padding: 0 24px 24px;
    gap: 24px;
    z-index: 2;
    min-height: 0;
  }

  /* ── Sidebar panels ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.06) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

  .side-section {
    background: var(--c-surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
  }

  .side-section h3 {
    font-size: 10px;
    font-weight: 600;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .side-selector {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .side-selector:last-child { margin-bottom: 0; }

  .side-selector label {
    font-size: 10px;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .side-selector select {
    appearance: none;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    /* Fix for dark theme dropdown */
    color-scheme: dark;
  }

  .side-selector select:hover { border-color: rgba(255,255,255,0.15); }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    width: 100%;
    text-align: center;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Center column ── */
  .center-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-height: 0;
  }

  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Webcam viewport ── */
  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 22px;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #0a0a10;
    position: relative;
    z-index: 2;
  }

  video.mirror { transform: scaleX(-1); }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 24px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Mobile layout (default) ── */
  .mobile-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    width: 100%;
    max-width: 720px;
    padding: 16px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  .mobile-layout .portal-stack {
    width: 100%;
    max-width: 640px;
  }

  .mobile-layout .selectors {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 10px;
    padding: 0 4px 10px;
    z-index: 2;
  }

  .mobile-layout .selector {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .mobile-layout .selector label {
    font-size: 10px;
    color: var(--c-text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .mobile-layout .selector select {
    appearance: none;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
  }

  .mobile-layout .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 2;
  }

  .mobile-layout .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    width: auto;
    text-align: center;
  }

  .mobile-layout .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .mobile-layout .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .mobile-layout .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
    padding: 0;
    background: none;
    border-radius: 0;
  }

  .mobile-layout .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .mobile-layout .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .mobile-layout .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  /* ── Responsive ── */
  @media (min-width: 1024px) {
    .pc-layout { display: flex; }
    .mobile-layout { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Parlor</h1>
  </div>
  <span class="model-label">OpenAI-compatible backend</span>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<!-- Desktop layout (PC only) -->
<div class="pc-layout">
  <!-- Left sidebar -->
  <aside class="sidebar">
    <div class="side-section">
      <h3>Settings</h3>
      <div class="side-selector">
        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="side-selector">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" disabled></select>
      </div>
    </div>

    <div class="side-section">
      <h3>Input Source</h3>
      <div class="side-selector">
        <label for="inputSourceSelect">Source</label>
        <select id="inputSourceSelect"></select>
      </div>
    </div>

    <div class="side-section">
      <h3>Status</h3>
      <div class="state-indicator">
        <div id="stateDot" class="dot loading"></div>
        <span id="stateText">Loading...</span>
      </div>
    </div>

    <div class="side-section">
      <span class="on-device-pill">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
        Multimodal
      </span>
    </div>
  </aside>

  <!-- Center column: video + chat -->
  <div class="center-col">
    <div class="portal-stack">
      <!-- Webcam viewport with glow layers -->
      <div id="viewportWrap" class="viewport-wrap loading">
        <div class="viewport-glow"></div>
        <video id="video" autoplay muted playsinline></video>
      </div>

      <!-- Audio waveform visualizer -->
      <div class="waveform-wrap">
        <canvas id="waveform"></canvas>
      </div>

      <!-- Transcript -->
      <div id="messages" class="transcript"></div>
    </div>
  </div>

  <!-- Right sidebar (mirrors left for balance, or leave empty) -->
  <aside class="sidebar">
    <!-- Can add more panels here in the future: history, preferences, etc. -->
  </aside>
</div>

<!-- Mobile layout (default) -->
<div class="mobile-layout">
  <div class="portal-stack">
    <!-- Webcam viewport with glow layers -->
    <div id="viewportWrap" class="viewport-wrap loading">
      <div class="viewport-glow"></div>
      <video id="video" autoplay muted playsinline></video>
    </div>

    <!-- Audio waveform visualizer -->
    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
    </div>

    <!-- Transcript -->
    <div id="messages" class="transcript"></div>

    <div class="selectors">
      <div class="selector">
        <label for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="selector">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect" disabled></select>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="side-selector" style="flex: 1;">
        <label for="inputSourceSelect">Input</label>
        <select id="inputSourceSelect"></select>
      </div>
      <div class="state-indicator">
        <div id="stateDot" class="dot loading"></div>
        <span id="stateText">Loading...</span>
      </div>
      <span class="on-device-pill">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
        Multimodal
      </span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
function $$(id) {
  const showPc = window.matchMedia('(min-width: 1024px)').matches;
  const layout = showPc ? '.pc-layout' : '.mobile-layout';
  const el = document.querySelector(`${layout} #${id}`);
  if (el) return el;
  return document.getElementById(id);
}
let video, inputSourceSelect, languageSelect, voiceSelect, messagesDiv, statusEl;
let stateDot, stateText, viewportWrap, waveformCanvas, waveformCtx;

function refreshElements() {
  video = $$('video');
  inputSourceSelect = $$('inputSourceSelect');
  languageSelect = $$('languageSelect');
  voiceSelect = $$('voiceSelect');
  messagesDiv = $$('messages');
  statusEl = $$('status');
  stateDot = $$('stateDot');
  stateText = $$('stateText');
  viewportWrap = $$('viewportWrap');
  waveformCanvas = $$('waveform');
  waveformCtx = waveformCanvas.getContext('2d');
}
refreshElements();

let ws, mediaStream, myvad, audioStream;
let cameraEnabled = true;
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let activeAssistantMsg = null;
let ttsOptions = null;
let selectedLanguage = 'ja';
let selectedVoice = 'jf_alpha';

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;
let streamSources = [];
let streamTtsTime = null;

// ── Waveform Visualizer ──
let analyser;
let micSource = null;

function getMicSource() {
  if (!micSource && audioStream && audioStream.getAudioTracks().length) {
    micSource = audioCtx.createMediaStreamSource(audioStream);
  }
  return micSource;
}
const BAR_COUNT = 40;
const BAR_GAP = 3;
let waveformRAF;
let ambientPhase = 0;

function initWaveformCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  waveformCanvas.width = rect.width * dpr;
  waveformCanvas.height = rect.height * dpr;
  waveformCtx.scale(dpr, dpr);
}

function getStateColor() {
  const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function renderLanguageOptions() {
  languageSelect.innerHTML = '';
  for (const language of ttsOptions.languages) {
    const option = document.createElement('option');
    option.value = language.code;
    option.textContent = `${language.label} (${language.code})`;
    languageSelect.appendChild(option);
  }
}

function renderVoiceOptions(languageCode, preferredVoice = null) {
  const language = ttsOptions.languages.find(item => item.code === languageCode) || ttsOptions.languages[0];
  voiceSelect.innerHTML = '';
  for (const voice of language.voices) {
    const option = document.createElement('option');
    option.value = voice;
    option.textContent = voice;
    voiceSelect.appendChild(option);
  }
  voiceSelect.disabled = false;
  voiceSelect.value = language.voices.includes(preferredVoice) ? preferredVoice : language.default_voice;
  selectedVoice = voiceSelect.value;
}

function setTtsSelection(languageCode, voice) {
  selectedLanguage = languageCode;
  languageSelect.value = languageCode;
  renderVoiceOptions(languageCode, voice);
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    if (!dataArray || amplitude < 0.02) {
      ambientPhase += 0.0001;
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  waveformRAF = requestAnimationFrame(drawWaveform);
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  document.querySelector('.viewport-glow').style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

// ── State Machine ──
function setState(newState) {
  state = newState;

  stateDot.className = `dot ${newState}`;
  const labels = { loading: 'Loading...', listening: 'Listening', processing: 'Thinking...', speaking: 'Speaking' };
  stateText.textContent = labels[newState] || newState;

  viewportWrap.className = `viewport-wrap ${newState}`;

  if (newState !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    document.querySelector('.viewport-glow').style.boxShadow = '';
  }

  const stateVars = {
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[newState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  if (newState === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });
  }

  if (newState === 'listening' && analyser) {
    try { getMicSource().connect(analyser); } catch {}
  } else {
    try { getMicSource().disconnect(analyser); } catch {}
  }
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    if (state !== 'loading') setState('listening');
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      if (msg.transcription) {
        updateLatestUserMessage(msg.transcription);
      }
      activeAssistantMsg = addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
    } else if (msg.type === 'text_start') {
      // A new assistant turn has started, so we can stop ignoring stale audio from the interrupted one.
      ignoreIncomingAudio = false;
      activeAssistantMsg = addMessage('assistant', '', '');
    } else if (msg.type === 'transcription_delta') {
      updateLatestUserMessage(msg.text);
    } else if (msg.type === 'text_delta') {
      if (activeAssistantMsg) {
        const meta = activeAssistantMsg.querySelector('.meta');
        const current = activeAssistantMsg.childNodes[0];
        if (current && current.nodeType === Node.TEXT_NODE) {
          current.textContent += msg.delta;
        } else {
          activeAssistantMsg.insertBefore(document.createTextNode(msg.delta), meta || null);
        }
      } else {
        activeAssistantMsg = addMessage('assistant', msg.delta, '');
      }
    } else if (msg.type === 'text_end') {
      if (msg.transcription) {
        updateLatestUserMessage(msg.transcription);
      }
      if (activeAssistantMsg) {
        const meta = activeAssistantMsg.querySelector('.meta');
        const textNode = activeAssistantMsg.childNodes[0];
        if (textNode && textNode.nodeType === Node.TEXT_NODE) {
          textNode.textContent = msg.text;
        } else {
          activeAssistantMsg.insertBefore(document.createTextNode(msg.text), meta || null);
        }
        if (meta) meta.textContent = `LLM ${msg.llm_time}s`;
      } else {
        activeAssistantMsg = addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
      }
      activeAssistantMsg = null;
    } else if (msg.type === 'audio_start') {
      if (ignoreIncomingAudio) return;
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (ignoreIncomingAudio) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState('listening');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · TTS ${msg.tts_time}s`;
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = text; }

// ── Video Source Switching ──
let videoSource = 'off';
let currentCameraId = null;

async function enumerateVideoDevices() {
  try {
    // Request camera permission first so labels are populated
    const probe = await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    probe.getTracks().forEach(t => t.stop());
    const videoInputs = devices.filter(d => d.kind === 'videoinput');
    const select = inputSourceSelect;
    select.innerHTML = '';
    const offOpt = document.createElement('option');
    offOpt.value = 'off';
    offOpt.textContent = 'Off';
    select.appendChild(offOpt);
    for (const device of videoInputs) {
      const opt = document.createElement('option');
      opt.value = device.deviceId;
      opt.textContent = device.label || 'Camera ' + (videoInputs.indexOf(device) + 1);
      select.appendChild(opt);
    }
    const screenOpt = document.createElement('option');
    screenOpt.value = 'screen';
    screenOpt.textContent = 'Screen Share';
    select.appendChild(screenOpt);
    if (select.querySelector('option[value="' + videoSource + '"]')) {
      select.value = videoSource;
    }
  } catch (e) { console.warn('Enumerate devices failed:', e.message); }
}

async function stopStream() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; video.srcObject = null; }
}

async function switchVideoSource(source) {
  if (source === videoSource) return;
  await stopStream();
  if (source === 'off') {
    mediaStream = null; videoSource = 'off';
    video.classList.remove('mirror');
  } else if (source === 'screen') {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' } });
      mediaStream = stream; video.srcObject = stream; videoSource = 'screen';
      video.classList.remove('mirror');
    } catch (e) { console.warn('Screen share failed:', e.message); }
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: source } } });
      mediaStream = stream; video.srcObject = stream; videoSource = source; currentCameraId = source;
      video.classList.add('mirror'); // default mirror for all cameras
    } catch (e) { console.warn('Camera start failed:', e.message); }
  }
}

function captureFrame() {
  if (videoSource === 'off' || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800;

function handleSpeechStart() {
  if (state === 'speaking') {
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const imageBase64 = captureFrame();

  setState('processing');
  setStatus('processing', 'Processing');
  addMessage('user', '<span class="loading-dots"><span></span><span></span><span></span></span>', imageBase64 ? 'with camera' : '', true);

  const payload = { audio: wavBase64, tts_language: selectedLanguage, tts_voice: selectedVoice };
  if (imageBase64) payload.image = imageBase64;
  ws.send(JSON.stringify(payload));
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Streaming Playback ──
function stopPlayback() {
  for (const src of streamSources) {
    try { src.stop(); } catch {}
  }
  streamSources = [];
  currentSource = null;
  streamNextTime = 0;
}

async function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
      getMicSource().connect(analyser);
    } catch (e) { console.warn('Mic capture failed:', e.message); }
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05;
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

// ── UI ──
function addMessage(role, text, meta, isHtml = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isHtml) {
    div.innerHTML = text;
  } else {
    div.appendChild(document.createTextNode(text));
  }
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    metaDiv.textContent = meta;
    div.appendChild(metaDiv);
  }
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return div;
}

function updateLatestUserMessage(text) {
  const userMsgs = messagesDiv.querySelectorAll('.msg.user');
  const lastUserMsg = userMsgs[userMsgs.length - 1];
  if (!lastUserMsg) return;

  const meta = lastUserMsg.querySelector('.meta');
  for (const node of [...lastUserMsg.childNodes]) {
    if (node !== meta) {
      lastUserMsg.removeChild(node);
    }
  }
  lastUserMsg.insertBefore(document.createTextNode(text), meta || null);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

inputSourceSelect.addEventListener('change', () => {
  switchVideoSource(inputSourceSelect.value);
});

// ── Init ──
async function init() {
  initWaveformCanvas();
  window.addEventListener('resize', () => { refreshElements(); initWaveformCanvas(); });

  ttsOptions = await fetch('/api/tts/options').then(response => response.json());
  renderLanguageOptions();
  setTtsSelection(ttsOptions.default_language, ttsOptions.default_voice);
  languageSelect.addEventListener('change', () => {
    selectedLanguage = languageSelect.value;
    renderVoiceOptions(selectedLanguage);
  });
  voiceSelect.addEventListener('change', () => {
    selectedVoice = voiceSelect.value;
  });

  await enumerateVideoDevices();
  connect();

  myvad = await vad.MicVAD.new({
    getStream: async () => {
      if (audioStream) { return audioStream; }
      try { return await navigator.mediaDevices.getUserMedia({ audio: true }); } catch { return new MediaStream(); }
    },
    positiveSpeechThreshold: 0.5,
    negativeSpeechThreshold: 0.25,
    redemptionMs: 600,
    minSpeechMs: 300,
    preSpeechPadMs: 300,
    onSpeechStart: handleSpeechStart,
    onSpeechEnd: handleSpeechEnd,
    onVADMisfire: () => { console.log('VAD misfire (too short)'); },
    onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
    baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
  });

  myvad.start();

  const initAudio = () => {
    ensureAudioCtx().then(() => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      document.removeEventListener('click', initAudio);
      document.removeEventListener('keydown', initAudio);
    });
  };
  document.addEventListener('click', initAudio);
  document.addEventListener('keydown', initAudio);
  ensureAudioCtx();

  setState('listening');
  drawWaveform();

  console.log('VAD initialized and listening');
}

init();
</script>
